<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Manager | Assignment A1</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 16px;
            margin-bottom: 32px;
        }

        .form-group {
            background: var(--bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 32px;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        button {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-update {
            background: #e0e7ff;
            color: var(--primary);
        }

        .btn-update:hover {
            background: var(--primary);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: var(--bg);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .action-cell {
            display: flex;
            gap: 8px;
        }

        .id-badge {
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: 600;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Cloud User Directory</h2>

        <!-- Create Form -->
        <form action="/save" method="post" class="form-group">
            <input type="text" name="name" placeholder="Enter Name" required>
            <button type="submit" class="btn-primary">Add User</button>
        </form>

        <!-- Read/Update/Delete Table -->
        <table>
            <thead>
                <tr>
                    <th width="80">ID</th>
                    <th>Name</th>
                    <th width="100">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td><span class="id-badge">#{{ user[0] }}</span></td>
                    <td>
                        <form action="/update/{{ user[0] }}" method="post" style="display:flex; gap: 8px;">
                            <input type="text" name="name" value="{{ user[1] }}" required>
                            <button type="submit" class="btn-update">Update</button>
                        </form>
                    </td>
                    <td>
                        <form action="/delete/{{ user[0] }}" method="post" onsubmit="return confirm('Remove user?');">
                            <button type="submit" class="btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" style="text-align:center; color: var(--text-muted); padding: 40px;">
                        No users connected to this cloud instance yet.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>

</html>
