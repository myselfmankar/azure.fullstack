<!DOCTYPE html>
<html>

<head>
    <title>Cloud Assignment</title>
</head>

<body>
    <h2>Cloud Computing Assignment</h2>

    <!-- Create Form -->
    <form action="/save" method="post" style="margin-bottom: 20px;">
        <input type="text" name="name" placeholder="Enter name" required>
        <button type="submit">Add User</button>
    </form>

    <!-- Read/Update/Delete Table -->
    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>
                    <!-- Update Form Inline -->
                    <form action="/update/{{ user[0] }}" method="post" style="display:inline;">
                        <input type="text" name="name" value="{{ user[1] }}" required>
                        <button type="submit">Update</button>
                    </form>
                </td>
                <td>
                    <!-- Delete Form -->
                    <form action="/delete/{{ user[0] }}" method="post" style="display:inline;"
                        onsubmit="return confirm('Delete user?');">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3">No users found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
